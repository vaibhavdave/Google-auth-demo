name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - backend/pom.xml
      - frontend/package.json
      - frontend/package-lock.json

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
